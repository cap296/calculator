
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleep Cycle Calculator</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background:#f7f7f7;
  margin:0;
  padding:16px;
}
.card {
  background:#fff;
  max-width:420px;
  margin:auto;
  padding:16px;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}
h1 { font-size:20px; }
.toggle {
  display:flex;
  gap:8px;
  margin-bottom:12px;
}
.toggle button {
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  background:#eee;
}
.toggle .active {
  background:#111;
  color:#fff;
}
label { display:block; margin-top:12px; font-size:14px; }
input, button {
  width:100%;
  margin-top:6px;
  padding:10px;
  font-size:16px;
  border-radius:10px;
  border:1px solid #ccc;
}
button.primary {
  background:#111;
  color:#fff;
  border:none;
  margin-top:16px;
}
.result {
  margin-top:8px;
  padding:10px;
  border-radius:10px;
  background:#eee;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.optimal { background:#dff5e3; font-weight:600; }
.install {
  background:#fff6d6;
  padding:10px;
  border-radius:10px;
  font-size:14px;
  margin-bottom:12px;
}
a { color:#007aff; text-decoration:none; font-size:13px; }
</style>
</head>
<body>

<div class="card">
  <div id="installTip" class="install" style="display:none;">
    Add this app to your Home Screen: Share → Add to Home Screen
  </div>

  <h1>Sleep Cycle Calculator</h1>

  <div class="toggle">
    <button id="wakeBtn" class="active">When should I wake up?</button>
    <button id="bedBtn">When should I go to bed?</button>
  </div>

  <label id="timeLabel">When are you going to bed?</label>
  <input type="time" id="timeInput">

  <label>Fall asleep time (minutes)</label>
  <input type="number" id="fall" value="15" min="0" max="60">

  <label>Sleep cycles (1–9)</label>
  <input type="number" id="cycles" value="6" min="1" max="9">

  <button class="primary" onclick="calculate()">Calculate</button>

  <div id="results"></div>

  <p style="margin-top:12px;">
    <a href="https://www.icloud.com/shortcuts/" target="_blank">
      Install Alarm Shortcut (one-time)
    </a>
  </p>
</div>

<script>
let mode = "wake";

wakeBtn.onclick = () => setMode("wake");
bedBtn.onclick = () => setMode("bed");

function setMode(m) {
  mode = m;
  wakeBtn.classList.toggle("active", m==="wake");
  bedBtn.classList.toggle("active", m==="bed");
  timeLabel.textContent = m==="wake"
    ? "When are you going to bed?"
    : "When do you need to wake up?";
}

function calculate() {
  const t = timeInput.value;
  if (!t) return;

  const [h,m] = t.split(":").map(Number);
  const fallMin = parseInt(fall.value,10);
  const max = parseInt(cycles.value,10);

  let base = new Date();
  base.setHours(h,m,0,0);
  results.innerHTML = "";

  for (let i=1;i<=max;i++) {
    let d = new Date(base);
    let offset = fallMin + i*90;
    d.setMinutes(d.getMinutes() + (mode==="wake"?offset:-offset));

    let hrs = d.getHours()%12 || 12;
    let mins = String(d.getMinutes()).padStart(2,"0");
    let ampm = d.getHours()>=12?"PM":"AM";

    let div = document.createElement("div");
    div.className = "result" + ((i===5||i===6)?" optimal":"");
    div.innerHTML = `
      <span>${hrs}:${mins} ${ampm} (${i} cycles)</span>
      <a href="shortcuts://run-shortcut?name=Create%20Alarm&input=${hrs}:${mins}%20${ampm}">
        Set alarm
      </a>`;
    results.appendChild(div);
  }
}

// Install hint
if (!window.matchMedia('(display-mode: standalone)').matches) {
  document.getElementById("installTip").style.display = "block";
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
